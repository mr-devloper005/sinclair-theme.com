services:
  st7q4v2m8x:
    container_name: st7q4v2m8x_app
    image: ghcr.io/mr-devloper005/sinclair-theme.com:latest
    env_file:
      - .env
    network_mode: bridge
    restart: always
    ports:
      - "127.0.0.1:3079:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 5m
      timeout: 3s
      retries: 2
